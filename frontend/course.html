<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程详情 - AI学习平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <div class="navbar-logo">AI</div>
            <span>AI学习平台</span>
        </a>
        <ul class="navbar-nav">
            <li><a href="index.html">课程</a></li>
            <li><a href="#">学习路径</a></li>
            <li><a href="#">社区</a></li>
        </ul>
        <div class="navbar-right">
            <div data-guest>
                <a href="login.html" class="btn btn-secondary btn-sm">登录</a>
                <a href="register.html" class="btn btn-primary btn-sm">注册</a>
            </div>
            <div data-auth class="user-menu" style="display: none;">
                <div class="user-menu-trigger">
                    <div class="user-avatar"></div>
                    <span class="user-name"></span>
                    <span>▼</span>
                </div>
                <div class="dropdown-menu">
                    <a href="#" class="dropdown-item">个人中心</a>
                    <a href="#" class="dropdown-item">我的课程</a>
                    <div class="dropdown-divider"></div>
                    <a href="#" class="dropdown-item" onclick="auth.logout(); return false;">退出登录</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 课程布局 -->
    <div class="course-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="loading" style="padding: 2rem;">
                <div class="spinner"></div>
            </div>
        </aside>

        <!-- 内容区 -->
        <main class="content-area" id="content">
            <div class="loading" style="padding: 3rem;">
                <div class="spinner"></div>
            </div>
        </main>
    </div>

    <!-- 脚本 -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 获取课程ID
        const courseId = app.getUrlParam('id');
        
        if (!courseId) {
            window.location.href = 'index.html';
        }
        
        // 加载课程详情
        async function loadCourse() {
            const sidebar = document.getElementById('sidebar');
            const content = document.getElementById('content');
            
            try {
                const course = await api.courses.get(courseId);
                
                // 更新页面标题
                app.setTitle(course.title);
                
                // 渲染侧边栏 - 章节列表
                sidebar.innerHTML = `
                    <div class="sidebar-header">
                        <h2>${escapeHtml(course.title)}</h2>
                        <p>${course.chapters ? course.chapters.length : 0} 个章节</p>
                    </div>
                    <ul class="chapter-list">
                        ${(course.chapters || []).map((chapter, index) => `
                            <li class="chapter-item">
                                <a href="chapter.html?id=${chapter.id}&course_id=${courseId}" class="chapter-link">
                                    <span class="chapter-number">${index + 1}</span>
                                    <span class="chapter-title">${escapeHtml(chapter.title)}</span>
                                </a>
                            </li>
                        `).join('')}
                    </ul>
                `;
                
                // 渲染课程内容
                content.innerHTML = `
                    <div style="margin-bottom: 2rem;">
                        <span class="difficulty-badge difficulty-${course.difficulty || 'beginner'}">
                            ${getDifficultyText(course.difficulty)}
                        </span>
                    </div>
                    <h1 style="margin-bottom: 1rem;">${escapeHtml(course.title)}</h1>
                    <p style="color: var(--text-secondary); font-size: 1.125rem; margin-bottom: 2rem;">
                        ${escapeHtml(course.description || '暂无描述')}
                    </p>
                    
                    ${course.chapters && course.chapters.length > 0 ? `
                        <div style="background: var(--card-bg); border-radius: var(--radius-lg); padding: 1.5rem; border: 1px solid var(--border-color);">
                            <h3 style="margin-bottom: 1rem;">课程大纲</h3>
                            <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                                ${course.chapters.map((chapter, index) => `
                                    <a href="chapter.html?id=${chapter.id}&course_id=${courseId}" 
                                       style="display: flex; align-items: center; gap: 1rem; padding: 1rem; background: var(--bg-color); border-radius: var(--radius); text-decoration: none; color: inherit; transition: all 0.2s;"
                                       onmouseover="this.style.background='var(--border-color)'"
                                       onmouseout="this.style.background='var(--bg-color)'">
                                        <span style="width: 32px; height: 32px; background: var(--primary-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600;">
                                            ${index + 1}
                                        </span>
                                        <div>
                                            <div style="font-weight: 500;">${escapeHtml(chapter.title)}</div>
                                            <div style="font-size: 0.875rem; color: var(--text-secondary);">${chapter.duration || '约10分钟'}</div>
                                        </div>
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    ` : `
                        <div class="empty-state">
                            <div class="empty-state-icon">📚</div>
                            <h3>课程暂无章节</h3>
                            <p>该课程正在建设中，敬请期待</p>
                        </div>
                    `}
                `;
            } catch (error) {
                sidebar.innerHTML = '';
                app.showError(content, error.message || '课程加载失败');
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function getDifficultyText(level) {
            const map = {
                'beginner': '入门',
                'intermediate': '进阶',
                'advanced': '高级'
            };
            return map[level] || '入门';
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadCourse();
        });
    </script>
</body>
</html>
