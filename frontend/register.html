<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - AI学习平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>创建账号</h1>
            <p class="subtitle">开始你的AI学习之旅</p>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" class="form-control" placeholder="设置一个用户名" required>
                </div>
                
                <div class="form-group">
                    <label for="email">邮箱地址</label>
                    <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" class="form-control" placeholder="设置密码（至少6位）" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="password-confirm">确认密码</label>
                    <input type="password" id="password-confirm" class="form-control" placeholder="再次输入密码" required>
                </div>
                
                <div class="form-footer">
                    <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">
                        注册
                    </button>
                </div>
            </form>
            
            <div class="auth-footer">
                已有账号? <a href="login.html">立即登录</a>
            </div>
        </div>
    </div>

    <!-- 脚本 (storage.js must load first) -->
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 已登录则跳转
        if (auth.isLoggedIn()) {
            window.location.href = 'index.html';
        }
        
        // 表单提交
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;
            const submitBtn = document.getElementById('submit-btn');
            
            // 验证
            if (!username || !email || !password) {
                app.toast('请填写完整的注册信息', 'error');
                return;
            }
            
            if (username.length < 2) {
                app.toast('用户名至少需要2个字符', 'error');
                return;
            }
            
            if (password.length < 6) {
                app.toast('密码至少需要6个字符', 'error');
                return;
            }
            
            if (password !== passwordConfirm) {
                app.toast('两次输入的密码不一致', 'error');
                return;
            }
            
            // 禁用按钮
            submitBtn.disabled = true;
            submitBtn.textContent = '注册中...';
            
            try {
                const result = await api.auth.register(username, email, password);
                
                app.toast('注册成功! 请登录', 'success');
                
                // 跳转到登录页
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1000);
                
            } catch (error) {
                app.toast(error.message || '注册失败，请稍后再试', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '注册';
            }
        });
        
        // 实时密码确认验证
        document.getElementById('password-confirm').addEventListener('input', function() {
            const password = document.getElementById('password').value;
            const confirm = this.value;
            
            if (confirm && password !== confirm) {
                this.classList.add('is-invalid');
            } else {
                this.classList.remove('is-invalid');
            }
        });
    </script>
</body>
</html>
