<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI学习平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>欢迎回来</h1>
            <p class="subtitle">登录你的AI学习平台账号</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">邮箱地址</label>
                    <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" class="form-control" placeholder="输入你的密码" required>
                </div>
                
                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; font-size: 0.875rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="remember" style="width: auto;">
                        <span>记住我</span>
                    </label>
                    <a href="#" style="color: var(--primary-color); text-decoration: none;">忘记密码?</a>
                </div>
                
                <div class="form-footer">
                    <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">
                        登录
                    </button>
                </div>
            </form>
            
            <div class="auth-footer">
                还没有账号? <a href="register.html">立即注册</a>
            </div>
        </div>
    </div>

    <!-- 脚本 -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 已登录则跳转
        if (auth.isLoggedIn()) {
            const redirect = app.getUrlParam('redirect') || 'index.html';
            window.location.href = decodeURIComponent(redirect);
        }
        
        // 表单提交
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submit-btn');
            
            // 验证
            if (!email || !password) {
                app.toast('请填写完整的登录信息', 'error');
                return;
            }
            
            // 禁用按钮
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';
            
            try {
                const result = await api.auth.login(email, password);
                
                // 保存认证信息
                auth.setAuth(result.access_token, result.user);
                
                app.toast('登录成功!', 'success');
                
                // 跳转
                setTimeout(() => {
                    const redirect = app.getUrlParam('redirect') || 'index.html';
                    window.location.href = decodeURIComponent(redirect);
                }, 500);
                
            } catch (error) {
                app.toast(error.message || '登录失败，请检查邮箱和密码', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '登录';
            }
        });
    </script>
</body>
</html>
