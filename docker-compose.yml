version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: ai-learning-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_learning
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: ai-learning-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-learning-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ai_learning
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-change-in-production
      - APP_NAME=AI学习平台
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock  # 用于代码沙箱
    restart: unless-stopped

  # 前端静态文件（使用nginx）
  frontend:
    image: nginx:alpine
    container_name: ai-learning-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  # 代码执行沙箱
  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: ai-learning-sandbox
    container_name: ai-learning-sandbox
    # 沙箱不直接暴露端口，通过backend调用
    # 需要privileged模式来限制资源
    privileged: true
    profiles:
      - sandbox  # 只在明确指定时启动

volumes:
  postgres_data:
  redis_data:
