name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Check formatting (black)
        run: black --check backend/
        continue-on-error: true  # non-blocking: formatting issues don't block merge

      - name: Check imports (isort)
        run: isort --check-only backend/
        continue-on-error: true  # non-blocking

      - name: Lint (flake8)
        run: flake8 backend/ --max-line-length=120 --count --show-source --statistics
        continue-on-error: true  # non-blocking: lint issues don't block merge

      - name: Run tests
        run: cd backend && python -m pytest tests/ -x -q --tb=short
        env:
          DATABASE_URL: sqlite:///./test_ci.db
          SECRET_KEY: test-secret-key-for-ci-at-least-32-characters-long
          REDIS_URL: redis://localhost:6379

  docker:
    runs-on: ubuntu-latest
    needs: test  # Docker job only runs if tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-learning-platform:${{ github.sha }} .

      - name: Smoke test
        run: |
          docker run -d --name test-container \
            -e SECRET_KEY=test-secret-key-for-ci-at-least-32-characters-long \
            -e DATABASE_URL=sqlite:///./app.db \
            -e REDIS_URL=redis://host.docker.internal:6379 \
            -p 8000:8000 \
            ai-learning-platform:${{ github.sha }}
          # Wait up to 30s for container to be healthy
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ Health check passed after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Health check failed after 30s"
              docker logs test-container
              exit 1
            fi
            sleep 1
          done
          docker stop test-container
          docker rm test-container
