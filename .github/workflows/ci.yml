name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Check formatting (black)
        run: black --check backend/
        continue-on-error: true

      - name: Check imports (isort)
        run: isort --check-only backend/
        continue-on-error: true

      - name: Lint (flake8)
        run: flake8 backend/ --max-line-length=120
        continue-on-error: true

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./test_ci.db
          SECRET_KEY: test-secret-key-for-ci-at-least-32-characters-long
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

      - name: Run data contract tests
        env:
          DATABASE_URL: sqlite:///./test_ci.db
          SECRET_KEY: test-secret-key-for-ci-at-least-32-characters-long
        run: |
          cd backend
          python -m pytest tests/test_data_contract.py -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-learning-platform:${{ github.sha }} ./backend

      - name: Smoke test
        run: |
          docker run -d --name test-container \
            -e SECRET_KEY=test-secret-key-for-ci-at-least-32-characters-long \
            -e DATABASE_URL=sqlite:///./app.db \
            -p 8000:8000 \
            ai-learning-platform:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || (docker logs test-container && exit 1)
          docker stop test-container
          docker rm test-container
