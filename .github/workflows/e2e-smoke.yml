name: E2E Smoke Tests

on:
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: /root/workspace/ai-learning-platform

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium

      - name: Start backend server
        run: cd backend && PYTHONPATH=. SERVE_STATIC=True uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        working-directory: /root/workspace/ai-learning-platform

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8000/health && break
            sleep 1
          done

      - name: Run E2E smoke tests
        run: npx playwright test tests/e2e/smoke.spec.js
